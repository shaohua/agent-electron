<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Test App</title>
  <style>
    body { font-family: -apple-system, sans-serif; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
    h1 { margin-bottom: 16px; }
    input { padding: 8px; margin-right: 8px; background: #2a2a4a; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; }
    button { padding: 8px 16px; background: #533483; color: white; border: none; border-radius: 4px; cursor: pointer; margin-right: 8px; }
    button:hover { background: #7b5ea7; }
    #counter { font-size: 24px; margin: 16px 0; }
    #result { margin: 12px 0; min-height: 20px; color: #4ecdc4; }
    #spinner { color: #ff6b6b; margin: 8px 0; }
    #data { color: #4ecdc4; margin: 8px 0; }
    ul { margin: 16px 0; padding-left: 20px; }
    li { margin: 4px 0; }
    .section { margin: 20px 0; padding: 12px; border: 1px solid #333; border-radius: 8px; }
  </style>
</head>
<body>
  <h1 id="title">Test App</h1>

  <div class="section">
    <h2>Form</h2>
    <input id="input" type="text" placeholder="Type here..." aria-label="Input field" />
    <button id="submitBtn">Submit</button>
    <div id="counter">0</div>
    <div id="result"></div>
  </div>

  <div class="section">
    <h2>Async</h2>
    <button id="loadBtn">Load Data</button>
    <div id="spinner" style="display:none">Loading...</div>
    <div id="data" style="display:none">Data loaded</div>
  </div>

  <div class="section">
    <h2>List</h2>
    <ul id="list">
      <li>Item 1</li>
      <li>Item 2</li>
      <li>Item 3</li>
    </ul>
  </div>

  <div class="section">
    <button id="openWindowBtn">Open Window</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    let count = 0;

    document.getElementById('submitBtn').addEventListener('click', () => {
      count++;
      document.getElementById('counter').textContent = String(count);
      const inputVal = document.getElementById('input').value;
      document.getElementById('result').textContent = 'Submitted: ' + inputVal;
    });

    document.getElementById('loadBtn').addEventListener('click', () => {
      const spinner = document.getElementById('spinner');
      const data = document.getElementById('data');
      spinner.style.display = 'block';
      data.style.display = 'none';
      setTimeout(() => {
        spinner.style.display = 'none';
        data.style.display = 'block';
      }, 1000);
    });

    document.getElementById('openWindowBtn').addEventListener('click', () => {
      ipcRenderer.send('open-second-window');
    });
  </script>
</body>
</html>
